services:
  - type: web
    name: chronos-os-api
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
