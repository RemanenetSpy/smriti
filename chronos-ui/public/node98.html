<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Node 98 — S-V-O Memory Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body,html{width:100%;height:100%;overflow:hidden;background:#030308;font-family:'Inter',sans-serif;color:#fff}
#c{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}

/* Caption */
#cap{
  position:absolute;bottom:7%;left:0;width:100%;z-index:10;
  display:flex;flex-direction:column;align-items:center;pointer-events:none;
}
.cc{
  text-align:center;width:88%;max-width:960px;
  background:radial-gradient(ellipse at center,rgba(3,3,8,.9) 0%,rgba(3,3,8,.45) 55%,transparent 80%);
  padding:36px 40px;border-radius:20px;
}
#ey{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.22em;
    color:rgba(255,255,255,.5);margin-bottom:12px;min-height:18px}
#hl{font-size:40px;font-weight:800;line-height:1.2;letter-spacing:-.02em;
    margin-bottom:12px;text-shadow:0 4px 24px #000}
#st{font-size:22px;font-weight:300;color:rgba(255,255,255,.78);line-height:1.45;
    text-shadow:0 2px 12px #000}

/* Terminal overlay */
#term{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(4,8,14,.9);border:1px solid rgba(0,245,212,.25);
  padding:24px 32px;border-radius:10px;font-family:'JetBrains Mono',monospace;
  font-size:17px;color:#00f5d4;z-index:5;opacity:0;pointer-events:none;
  box-shadow:0 0 40px rgba(0,245,212,.08);text-align:left;min-width:340px;
}
#term .lbl{color:#555;font-size:12px;margin-bottom:8px}

.cy{color:#00f5d4}.am{color:#ffb703}.mg{color:#ff006e}.bl{color:#3a86ff}

#prog{position:fixed;bottom:0;left:0;height:3px;
      background:linear-gradient(90deg,#3a86ff,#00f5d4,#ff006e);width:0%;z-index:100}
#click{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
       font-size:18px;font-weight:600;letter-spacing:.08em;color:rgba(255,255,255,.5);
       z-index:20;pointer-events:none;text-align:center;
       text-shadow:0 2px 8px #000}
</style>
</head>
<body>
<div id="c"></div>

<div id="term">
  <div class="lbl">&gt; MEMORY QUERY</div>
  <div id="ttext">Query: Why did we argue on Friday?</div>
</div>

<div id="cap">
  <div class="cc">
    <div id="ey">NODE 98</div>
    <div id="hl">The Memory Architecture</div>
    <div id="st">Click anywhere to begin</div>
  </div>
</div>
<div id="prog"></div>
<div id="click">Click to begin</div>

<script>
// ── RENDERER ──────────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.getElementById('c').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x030308, 0.0018);
const cam = new THREE.PerspectiveCamera(52, W/H, 0.5, 5000);
cam.position.set(0, 40, 360);

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam.aspect = window.innerWidth/window.innerHeight;
  cam.updateProjectionMatrix();
});

// ── SHARED GEOMETRIES (reused across scenes) ──────────────────────────────────
const gSphere = new THREE.SphereGeometry(10, 20, 20);
const gSphSm  = new THREE.SphereGeometry(4, 10, 10);
const gBox    = new THREE.BoxGeometry(16, 16, 16);
const gIco    = new THREE.IcosahedronGeometry(1, 0); // simplest ico

// ── SCENE MANAGER ─────────────────────────────────────────────────────────────
const groups = {};
function makeGroup(name) {
  const g = new THREE.Group();
  g.visible = false;
  scene.add(g);
  groups[name] = g;
  return g;
}

// ── MATERIALS ─────────────────────────────────────────────────────────────────
const MC = (hex, opts={}) => new THREE.MeshBasicMaterial({color:hex,...opts});
const LC = (hex, opts={}) => new THREE.LineBasicMaterial({color:hex,transparent:true,...opts});

// ── UTILITY ───────────────────────────────────────────────────────────────────
const line = (a,b,mat) => {
  const g = new THREE.BufferGeometry().setFromPoints([a,b]);
  return new THREE.Line(g, mat);
};
const mesh = (geo, mat) => new THREE.Mesh(geo, mat);
const v3 = (x,y,z) => new THREE.Vector3(x,y,z);

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE 1 — SVO Extraction: raw cloud → 3 crisp nodes
// ═══════════════════════════════════════════════════════════════════════════════
const s1 = makeGroup('s1');
// Particle cloud
const cloudG = new THREE.BufferGeometry();
const cPts = [];
for(let i=0;i<180;i++) cPts.push((Math.random()-.5)*200,(Math.random()-.5)*120,(Math.random()-.5)*120);
cloudG.setAttribute('position', new THREE.Float32BufferAttribute(cPts,3));
const cloudMat = new THREE.PointsMaterial({color:0x555566,size:2.5,transparent:true,opacity:0});
s1.add(new THREE.Points(cloudG, cloudMat));

// S, V, O nodes
const matS = MC(0x00f5d4,{transparent:true,opacity:0});
const matV = MC(0xff006e,{transparent:true,opacity:0});
const matO = MC(0xffb703,{transparent:true,opacity:0});
const nS = mesh(gSphere, matS); nS.position.set(-90,0,0);
const nV = mesh(gSphere, matV); nV.position.set(0,0,0);
const nO = mesh(gSphere, matO); nO.position.set(90,0,0);
s1.add(nS, nV, nO);
const lSV = line(nS.position, nV.position, LC(0xffffff,{opacity:0}));
const lVO = line(nV.position, nO.position, LC(0xffffff,{opacity:0}));
s1.add(lSV, lVO);

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE 2 — Lattice chain (5 SVO triangles)
// ═══════════════════════════════════════════════════════════════════════════════
const s2 = makeGroup('s2');
const latticeMats = {s:MC(0x00f5d4,{transparent:true,opacity:0}),
                     v:MC(0xff006e,{transparent:true,opacity:0}),
                     o:MC(0xffb703,{transparent:true,opacity:0}),
                     l:LC(0xffffff,{opacity:0})};
for(let i=0;i<5;i++){
  const g = new THREE.Group();
  const s = mesh(new THREE.SphereGeometry(7,12,12), latticeMats.s); s.position.set(-25,0,0);
  const v = mesh(new THREE.SphereGeometry(7,12,12), latticeMats.v); v.position.set(0,28,0);
  const o = mesh(new THREE.SphereGeometry(7,12,12), latticeMats.o); o.position.set(25,0,0);
  g.add(s,v,o,line(s.position,v.position,latticeMats.l),line(v.position,o.position,latticeMats.l));
  g.position.set((i-2)*115,(i%2===0?0:20)-10,0);
  g.rotation.z = (Math.random()-.5)*.3;
  s2.add(g);
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE 3 — Dual pgvector cylinders
// ═══════════════════════════════════════════════════════════════════════════════
const s3 = makeGroup('s3');
const cylG = new THREE.CylinderGeometry(44,44,160,28,1,true);
const matCylB = MC(0x3a86ff,{wireframe:true,transparent:true,opacity:0});
const matCylO = MC(0xffb703,{wireframe:true,transparent:true,opacity:0});
const cylL = mesh(cylG, matCylB); cylL.position.set(-110,0,0);
const cylR = mesh(cylG, matCylO); cylR.position.set(110,0,0);
s3.add(cylL, cylR);
// Labels as small floating point clusters
for(let i=0;i<24;i++){
  const m = mesh(new THREE.SphereGeometry(2,6,6), MC(i%2===0?0x3a86ff:0xffb703,{transparent:true,opacity:0}));
  m.position.set(i%2===0?-110+Math.random()*20-10:110+Math.random()*20-10,
                 (Math.random()-.5)*140, (Math.random()-.5)*40);
  s3.add(m);
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE 4 — Timeline with blocks snapping in
// ═══════════════════════════════════════════════════════════════════════════════
const s4 = makeGroup('s4');
const tlMat = LC(0x333355,{opacity:0});
s4.add(line(v3(-420,0,0), v3(420,0,0), tlMat));
const blocks = [];
const blockMats = [];
for(let i=0;i<10;i++){
  const bm = MC([0x00f5d4,0xff006e,0xffb703,0x3a86ff][i%4],{transparent:true,opacity:0});
  blockMats.push(bm);
  const b = mesh(gBox, bm);
  b.position.set(-360+i*80, 60, 0); // start above
  blocks.push(b);
  s4.add(b);
}
// Synapse lines between blocks
const synMats = [];
for(let i=0;i<9;i++){
  const sm = LC(0x00f5d4,{opacity:0});
  synMats.push(sm);
  s4.add(line(v3(-360+i*80,0,0), v3(-360+(i+1)*80,0,0), sm));
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE 5 — Security shield
// ═══════════════════════════════════════════════════════════════════════════════
const s5 = makeGroup('s5');
const shieldG = new THREE.IcosahedronGeometry(110, 1);
const shieldMat = MC(0x00f5d4,{wireframe:true,transparent:true,opacity:0});
const shield = mesh(shieldG, shieldMat);
s5.add(shield);
// Inner glow cluster (fake bloom)
for(let i=0;i<80;i++){
  const pm = new THREE.PointsMaterial({color:0x00f5d4,size:2,transparent:true,opacity:0});
  const pg = new THREE.BufferGeometry();
  const theta = Math.random()*Math.PI*2, phi = Math.random()*Math.PI;
  const r = 80+Math.random()*30;
  pg.setAttribute('position', new THREE.Float32BufferAttribute([
    r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta)
  ],3));
  s5.add(new THREE.Points(pg,pm));
}

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE 6 — City / scalability (300 boxes, not 2000)
// ═══════════════════════════════════════════════════════════════════════════════
const s6 = makeGroup('s6');
const cityMat = MC(0x3a86ff,{transparent:true,opacity:0});
const cityG = new THREE.BoxGeometry(8,8,8);
const city = new THREE.InstancedMesh(cityG, cityMat, 300);
const dm = new THREE.Object3D();
for(let i=0;i<300;i++){
  dm.position.set((Math.random()-.5)*1000,(Math.random()-.5)*300,(Math.random()-.5)*800-200);
  dm.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,0);
  dm.updateMatrix();
  city.setMatrixAt(i, dm.matrix);
}
s6.add(city);

// ═══════════════════════════════════════════════════════════════════════════════
// SCENE 7 — Brain (points cloud on icosphere)
// ═══════════════════════════════════════════════════════════════════════════════
const s7 = makeGroup('s7');
const brainG = new THREE.IcosahedronGeometry(130,2);
const brainMat = new THREE.PointsMaterial({color:0xff006e,size:3.5,transparent:true,opacity:0});
s7.add(new THREE.Points(brainG, brainMat));
// Pulsing core
const coreMat = MC(0xff006e,{wireframe:true,transparent:true,opacity:0});
s7.add(mesh(new THREE.IcosahedronGeometry(60,1), coreMat));

// ── RENDER LOOP ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let running = false;
let startT = 0;

function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Scene-specific idle animations
  nS.position.y = Math.sin(t*1.2)*8;
  nO.position.y = Math.cos(t*1.1)*8;
  nV.rotation.y = t*.6;
  s2.rotation.y = t*.08;
  cylL.rotation.y = t*.5;
  cylR.rotation.y = -t*.5;
  shield.rotation.y = t*.4;
  shield.rotation.x = t*.2;
  s7.rotation.y = t*.12;
  city.rotation.y = t*.04;

  renderer.render(scene, cam);
}
animate();

// ── CAPTION ───────────────────────────────────────────────────────────────────
function cap(ey, hl, st){
  const E=document.getElementById('ey'),H=document.getElementById('hl'),S=document.getElementById('st');
  gsap.to([E,H,S],{opacity:0,y:-8,duration:.25,onComplete:()=>{
    E.innerHTML=ey; H.innerHTML=hl; S.innerHTML=st;
    gsap.to([E,H,S],{opacity:1,y:0,duration:.4});
  }});
}

// ── SHOW / HIDE GROUPS ───────────────────────────────────────────────────────
function show(g){ g.visible=true; }
function hide(...gs){ gs.forEach(g=>{ g.visible=false; }); }

// ── GSAP MASTER TIMELINE ─────────────────────────────────────────────────────
function buildTimeline(){
  const tl = gsap.timeline();

  // ─ Scene 1: 0s–8s SVO ─────────────────────────────────────────────────────
  tl.call(()=>{ show(s1); cap('NODE 98','<span class="cy">S — V — O</span>','Subject. Verb. Object.'); },null,0);
  tl.to(cloudMat,{opacity:.7,duration:1.5},0.2);
  tl.to(cloudMat,{opacity:0,duration:1.5},3);
  tl.to([matS,matV,matO],{opacity:.95,duration:1},3.5);
  tl.to([lSV.material,lVO.material],{opacity:.5,duration:.8},4.5);

  // ─ Scene 2: 8s–15s Lattice ────────────────────────────────────────────────
  tl.call(()=>{
    hide(s1); show(s2);
    cap('LATTICE','Physical Memory Structure','S-V-O is not grammar — it is architecture');
  },null,8);
  tl.to(latticeMats.s,{opacity:.9,duration:1},8.3);
  tl.to(latticeMats.v,{opacity:.9,duration:1},8.5);
  tl.to(latticeMats.o,{opacity:.9,duration:1},8.7);
  tl.to(latticeMats.l,{opacity:.5,duration:1},9);

  // ─ Scene 3: 15s–23s Dual pgvector ────────────────────────────────────────
  tl.call(()=>{
    hide(s2); show(s3);
    cap('DUAL PGVECTOR','<span class="bl">Semantic</span> + <span class="am">Episodic</span>','Two vector spaces. One memory.');
  },null,15);
  tl.to([matCylB,matCylO],{opacity:.75,duration:1.5},15.5);
  tl.to(cam.position,{y:160,z:280,duration:7,ease:'power1.inOut'},15);

  // ─ Scene 4: 23s–37s Timeline + Synapses ─────────────────────────────────
  tl.call(()=>{
    hide(s3); show(s4);
    cap('TIMELINE','Chronological Mapping','Every S-V-O block placed exactly where it happened');
    gsap.to(cam.position,{y:40,z:400,duration:2});
  },null,23);
  tl.to(tlMat,{opacity:.4,duration:1},23.5);
  // Blocks drop in one by one
  blocks.forEach((b,i)=>{
    tl.to(blockMats[i],{opacity:.85,duration:.4},24+i*.4);
    tl.to(b.position,{y:0,duration:.5,ease:'bounce.out'},24+i*.4);
  });
  // Synapse reveal
  tl.call(()=>cap('BIOMIMICRY','Synaptic Tagging','Recalled events strengthen their connections'),null,33);
  synMats.forEach((sm,i)=>{
    tl.to(sm,{opacity:.8,duration:.3,yoyo:true,repeat:3},33+i*.25);
  });

  // ─ Scene 5: 37s–46s LIVE DEMO ────────────────────────────────────────────
  tl.call(()=>{
    hide(s4); show(s4); // keep blocks, overlay terminal
    cap('QUERY','<span class="cy">Tracing Context</span>','The system knows Tuesday caused Friday');
    gsap.to('#term',{opacity:1,duration:.4});
  },null,37);
  tl.call(()=>{ blockMats[1].color.set(0xff006e); blockMats[4].color.set(0xff006e); },null,40);
  tl.call(()=>{ blockMats[1].color.set(0x00f5d4); blockMats[4].color.set(0x00f5d4); },null,43);
  tl.to('#term',{opacity:0,duration:.4},45);

  // ─ Scene 6: 46s–55s Scalability ─────────────────────────────────────────
  tl.call(()=>{
    hide(s4); show(s6);
    cap('SCALABILITY','Millions of Nodes','Pure vector indexing scales infinitely');
    gsap.to(cam.position,{z:900,y:100,duration:8,ease:'power1.inOut'});
  },null,46);
  tl.to(cityMat,{opacity:.65,duration:2},47);

  // ─ Scene 7: 55s–63s SQL Comparison ──────────────────────────────────────
  tl.call(()=>{
    cap('EFFICIENCY','vs. Traditional SQL','O(1) connection retrieval — no scanning');
  },null,55);

  // ─ Scene 8: 63s–72s Security ─────────────────────────────────────────────
  tl.call(()=>{
    hide(s6); show(s5);
    cap('SECURITY','Cryptographic Enclave','Context leakage is impossible');
    gsap.to(cam.position,{z:360,y:40,duration:2});
  },null,63);
  tl.to(shieldMat,{opacity:.85,duration:1.5},64);
  s5.children.forEach((c,i)=>{
    if(c.material && c.material.isPointsMaterial)
      tl.to(c.material,{opacity:.6,duration:.2},65+i*.02);
  });

  // ─ Scene 9: 72s–80s Brain ─────────────────────────────────────────────────
  tl.call(()=>{
    hide(s5); show(s7);
    cap('THE FUTURE','Will AI Need Its Own Brain?','If we give them a timeline...');
    gsap.to(cam.position,{z:340,y:20,duration:2});
  },null,72);
  tl.to(brainMat,{opacity:.85,duration:2},73);
  tl.to(coreMat,{opacity:.35,duration:2},73.5);

  // End
  tl.call(()=>cap('NODE 98','Sequence Complete','S-V-O Architecture'),null,79);
  tl.to('#prog',{width:'100%',duration:80,ease:'none'},0);

  return tl;
}

// ── CLICK TO START ────────────────────────────────────────────────────────────
let started = false;
document.addEventListener('click',()=>{
  if(started) return;
  started = true;
  document.getElementById('click').style.display='none';
  buildTimeline().play();
}, {once:true});
</script>
</body>
</html>
